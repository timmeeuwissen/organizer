  /api/v1/ai/process-document:
    post:
      summary: Analyze a document and extract structured entities across all modules
      tags: [ai]
      security: [{ BearerToken: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, integration]
              properties:
                text:
                  type: string
                integration:
                  type: object
                  required: [provider, apiKey]
                hints:
                  type: object
                  properties:
                    modules:
                      type: array
                      items: { type: string }
      responses:
        '200':
          description: 'Structured entities, summary, and suggested actions'

components:
  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
      description: Long-lived API token issued via POST /api/v1/auth/token
    FirebaseIdToken:
      type: http
      scheme: bearer
      description: Short-lived Firebase ID token (for token management only)
