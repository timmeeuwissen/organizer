name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: organizer-app

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: organizer-app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: organizer-app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    env:
      NUXT_PUBLIC_FIREBASE_API_KEY: dummy
      NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
      NUXT_PUBLIC_FIREBASE_PROJECT_ID: dummy
      NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
      NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
      NUXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:000000000000'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: organizer-app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
